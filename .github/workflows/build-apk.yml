name: Build OBD Dashboard APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p www
          # If index.html is at repo root, move it into www/
          if [ -f "index.html" ] && [ ! -f "www/index.html" ]; then
            cp index.html www/index.html
            echo "Copied index.html from root to www/"
          fi
          # Verify
          if [ ! -f "www/index.html" ]; then
            echo "ERROR: www/index.html not found in repo!"
            ls -la
            ls -la www/ 2>/dev/null || echo "(www/ is empty or missing)"
            exit 1
          fi
          echo "OK: www/index.html found ($(wc -c < www/index.html) bytes)"

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Add Bluetooth permissions
        run: |
          FILE="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<manifest|<uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <manifest|' "$FILE"

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OBD-Dashboard-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

name: Build Craft Car Dashboard APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Patch plugin - insecure Bluetooth connect
        run: |
          FILE="node_modules/@e-is/capacitor-bluetooth-serial/android/src/main/java/com/bluetoothserial/BluetoothSerialService.java"
          sed -i 's/connect(device, true, serial)/connect(device, false, serial)/g' "$FILE"
          echo "Patched: $(grep 'connect(device,' $FILE)"

      - name: Prepare web assets
        run: |
          mkdir -p www
          if [ -f "index.html" ] && [ ! -f "www/index.html" ]; then
            cp index.html www/index.html
          fi
          ls www/ && echo "Assets ready"

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Generate app icons
        run: |
          pip install Pillow --break-system-packages -q
          python3 - << 'PYEOF'
          import os, math
          from PIL import Image, ImageDraw

          def draw_rect_gear(draw, cx, cy, r_out, r_in, teeth, hole_r, color, start_a=0):
              pts = []
              hw = math.pi / teeth * 0.48
              for i in range(teeth):
                  a = start_a + 2 * math.pi * i / teeth
                  pts.append((cx + r_in  * math.cos(a - hw - 0.02), cy + r_in  * math.sin(a - hw - 0.02)))
                  pts.append((cx + r_out * math.cos(a - hw),         cy + r_out * math.sin(a - hw)))
                  pts.append((cx + r_out * math.cos(a + hw),         cy + r_out * math.sin(a + hw)))
                  pts.append((cx + r_in  * math.cos(a + hw + 0.02), cy + r_in  * math.sin(a + hw + 0.02)))
              draw.polygon(pts, fill=color)
              draw.ellipse([cx-hole_r, cy-hole_r, cx+hole_r, cy+hole_r], fill=(0,0,0,255))

          sizes = {"mdpi": 48, "hdpi": 72, "xhdpi": 96, "xxhdpi": 144, "xxxhdpi": 192}

          # If logo.png exists in repo root, use it directly (exact logo)
          use_logo = os.path.exists("logo.png")
          if use_logo:
              src = Image.open("logo.png").convert("RGBA")
              print("Using logo.png from repo")

          for dpi, sz in sizes.items():
              for fname in ["ic_launcher.png", "ic_launcher_round.png"]:
                  if use_logo:
                      img = src.resize((sz, sz), Image.LANCZOS)
                  else:
                      img = Image.new("RGBA", (sz, sz), (0, 0, 0, 255))
                      d = ImageDraw.Draw(img)
                      s = sz / 192
                      # Blue gear: large, fills frame, bottom cropped (matches Craft Innovations logo)
                      draw_rect_gear(d, int(92*s), int(122*s), int(94*s), int(75*s), 8, int(44*s), "#1565C0", math.pi/8)
                      # Green gear: upper-right overlapping
                      draw_rect_gear(d, int(130*s), int(68*s), int(64*s), int(50*s), 6, int(31*s), "#4CAF50", math.pi/6)
                  out = "android/app/src/main/res/mipmap-" + dpi
                  os.makedirs(out, exist_ok=True)
                  img.save(out + "/" + fname)
          print("Icons done" + (" (from logo.png)" if use_logo else " (generated)"))
          PYEOF

      - name: Patch MainActivity - keep-alive + Picture-in-Picture
        run: |
          python3 - << 'PYEOF'
          import textwrap
          path = "android/app/src/main/java/com/obddashboard/app/MainActivity.java"
          with open(path) as f:
              c = f.read()
          if "onUserLeaveHint" not in c:
              pip_class = textwrap.dedent("""
                  public class MainActivity extends BridgeActivity {
                      @Override
                      public void onPause() {
                          super.onPause();
                          if (getBridge() != null && getBridge().getWebView() != null) {
                              getBridge().getWebView().onResume();
                          }
                      }
                      @Override
                      public void onUserLeaveHint() {
                          super.onUserLeaveHint();
                          if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O) {
                              android.app.PictureInPictureParams.Builder b =
                                  new android.app.PictureInPictureParams.Builder();
                              b.setAspectRatio(new android.util.Rational(9, 16));
                              enterPictureInPictureMode(b.build());
                          }
                      }
                      @Override
                      public void onPictureInPictureModeChanged(
                              boolean pip, android.content.res.Configuration cfg) {
                          super.onPictureInPictureModeChanged(pip, cfg);
                          if (getBridge() != null && getBridge().getWebView() != null) {
                              final String js =
                                  "document.dispatchEvent(new CustomEvent(" +
                                  "'pipmode',{detail:{active:" + pip + "}}));";
                              getBridge().getWebView().post(new Runnable() {
                                  public void run() {
                                      getBridge().getWebView().evaluateJavascript(js, null);
                                  }
                              });
                          }
                      }
                  }""").lstrip()
              patched = c.replace(
                  "public class MainActivity extends BridgeActivity {}",
                  pip_class
              )
              with open(path, "w") as f:
                  f.write(patched)
              print("MainActivity patched: keep-alive + PiP")
          else:
              print("Already patched")
          PYEOF

      - name: Add Bluetooth + screen + PiP permissions
        run: |
          FILE="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "BLUETOOTH_CONNECT" "$FILE"; then
            sed -i 's|    <application|    <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <application|' "$FILE"
            echo "Bluetooth permissions added"
          fi
          if ! grep -q "keepScreenOn" "$FILE"; then
            sed -i 's|android:exported="true">|android:exported="true"\n            android:keepScreenOn="true">|' "$FILE"
            echo "keepScreenOn added"
          fi
          python3 - "$FILE" << 'PYEOF'
          import sys
          path = sys.argv[1]
          c = open(path).read()
          if 'supportsPictureInPicture' not in c:
              c = c.replace(
                  'android:keepScreenOn="true">',
                  'android:keepScreenOn="true"\n            android:supportsPictureInPicture="true"\n            android:configChanges="screenSize|smallestScreenSize|screenLayout|orientation">'
              )
              open(path, 'w').write(c)
              print("PiP support added to AndroidManifest")
          else:
              print("PiP already present")
          PYEOF

      - name: Update app name
        run: |
          FILE="android/app/src/main/res/values/strings.xml"
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Craft Car Dashboard</string>|' "$FILE"
          echo "App name: $(grep app_name $FILE)"

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OBD-Dashboard-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

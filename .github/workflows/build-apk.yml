name: Build OBD Dashboard APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Patch plugin - insecure Bluetooth connect
        run: |
          FILE="node_modules/@e-is/capacitor-bluetooth-serial/android/src/main/java/com/bluetoothserial/BluetoothSerialService.java"
          sed -i 's/connect(device, true, serial)/connect(device, false, serial)/g' "$FILE"
          echo "Patched: $(grep 'connect(device,' $FILE)"

      - name: Prepare web assets
        run: |
          mkdir -p www
          if [ -f "index.html" ] && [ ! -f "www/index.html" ]; then
            cp index.html www/index.html
          fi
          ls www/ && echo "Assets ready"

      - name: Fix HTML
        run: |
          node -e "
          const fs = require('fs');
          const p = 'www/index.html';
          const tail  = Buffer.from('', 'base64').toString('utf-8');
          const modal = Buffer.from('','base64').toString('utf-8');
          const oldC  = Buffer.from('YXdhaXQgQlQuY29ubmVjdEluc2VjdXJlKHthZGRyZXNzOmNob3Nlbi5hZGRyZXNzfSk7','base64').toString('utf-8');
          const newC  = Buffer.from('YXdhaXQgQlQuY29ubmVjdCh7YWRkcmVzczpjaG9zZW4uYWRkcmVzc30pOw==','base64').toString('utf-8');
          let c = fs.readFileSync(p, 'utf-8');
          let changed = false;

          if (!c.includes('function finishScan')) {
            const cut = c.lastIndexOf('flist.innerHTML=');
            if (cut !== -1) { c = c.substring(0, cut) + tail; changed = true; console.log('Fix 1: tail'); }
          }
          if (!c.includes('id=\"bt-picker\"')) {
            c = c.replace('</body>', modal + '\n</body>'); changed = true; console.log('Fix 2: bt-picker');
          }
          if (c.includes(oldC)) {
            c = c.replace(oldC, newC); changed = true; console.log('Fix 3: connect()');
          }
          if (!c.includes('requestPermissions')) {
            c = c.replace('// Enable BT if off', 'try{ BT.requestPermissions(); }catch{}\n    // Enable BT if off');
            changed = true; console.log('Fix 4: permissions');
          }
          if (!c.includes('const sleep=')) {
            c = c.replace('<script>', '<script>\nconst sleep=ms=>new Promise(r=>setTimeout(r,ms));');
            changed = true; console.log('Fix 5: sleep');
          }

          if (changed) fs.writeFileSync(p, c, 'utf-8');
          else console.log('No fixes needed');
          "

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Add Bluetooth permissions
        run: |
          FILE="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "BLUETOOTH_CONNECT" "$FILE"; then
            sed -i 's|    <application|    <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <application|' "$FILE"
            echo "Bluetooth permissions added"
          fi

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OBD-Dashboard-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

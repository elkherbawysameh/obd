name: Build OBD Dashboard APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Patch plugin - insecure Bluetooth connect
        run: |
          FILE="node_modules/@e-is/capacitor-bluetooth-serial/android/src/main/java/com/bluetoothserial/BluetoothSerialService.java"
          sed -i 's/connect(device, true, serial)/connect(device, false, serial)/g' "$FILE"
          echo "Patched: $(grep 'connect(device,' $FILE)"

      - name: Prepare web assets
        run: |
          mkdir -p www
          if [ -f "index.html" ] && [ ! -f "www/index.html" ]; then
            cp index.html www/index.html
          fi
          ls www/ && echo "Assets ready"

      - name: Fix HTML
        run: |
          node -e "
          const fs=require('fs');
          const p='www/index.html';
          const tail    =Buffer.from('','base64').toString('utf-8');
          const modal   =Buffer.from('','base64').toString('utf-8');
          const oldCon  =Buffer.from('YXdhaXQgQlQuY29ubmVjdEluc2VjdXJlKHthZGRyZXNzOmNob3Nlbi5hZGRyZXNzfSk7','base64').toString('utf-8');
          const newCon  =Buffer.from('YXdhaXQgQlQuY29ubmVjdCh7YWRkcmVzczpjaG9zZW4uYWRkcmVzc30pOw==','base64').toString('utf-8');
          const oldPids =Buffer.from('Y29uc3QgUElEUz1bJzAxMEQNJywnMDEwQw0nLCcwMTA1DScsJzAxMkYNJywnMDEwQg0nLCcwMTExDScsJzAxMDQNJywnMDEwRg0nLCcwMTQyDSddOw==','base64').toString('utf-8');
          const newPids =Buffer.from('Y29uc3QgUElEUz1bJzAxMEQNJywnMDEwQw0nLCcwMTA1DScsJzAxMkYNJywnMDEwQg0nLCcwMTExDScsJzAxMDQNJywnMDEwRg0nLCcwMTQyDScsJ0FUUlYNJ107','base64').toString('utf-8');
          const oldFault=Buffer.from('fSBlbHNlIGlmKFMuY29ubmVjdGVkJiZidENoYXIpew==','base64').toString('utf-8');
          const newFault=Buffer.from('fSBlbHNlIGlmKFMuY29ubmVjdGVkJiYoYnRDaGFyfHxfYnRDbGFzc2ljKSl7','base64').toString('utf-8');
          let c=fs.readFileSync(p,'utf-8'),x=false;
          if(!c.includes('function finishScan')){const cut=c.lastIndexOf('flist.innerHTML=');if(cut!==-1){c=c.substring(0,cut)+tail;x=true;console.log('Fix1:tail');}}
          if(!c.includes('id=\"bt-picker\"')){c=c.replace('</body>',modal+'\n</body>');x=true;console.log('Fix2:bt-picker');}
          if(c.includes(oldCon)){c=c.replace(oldCon,newCon);x=true;console.log('Fix3:connect');}
          if(!c.includes('requestPermissions')){c=c.replace('// Enable BT if off','try{ BT.requestPermissions(); }catch{}\n    // Enable BT if off');x=true;console.log('Fix4:perms');}
          if(!c.includes('const sleep=')){c=c.replace('<script>','<script>\nconst sleep=ms=>new Promise(r=>setTimeout(r,ms));');x=true;console.log('Fix5:sleep');}
          if(c.includes(oldPids)){c=c.replace(oldPids,newPids);x=true;console.log('Fix6:ATRV');}
          if(!c.includes('atrvMatch')){c=c.replace('raw.split(/[\r\n]+/).forEach','const atrvMatch=raw.match(/(\d+\.\d+)V/i);if(atrvMatch){const v=parseFloat(atrvMatch[1]);if(v>5&&v<20)S.voltage=v;}\n  raw.split(/[\r\n]+/).forEach');x=true;console.log('Fix7:voltage');}
          if(c.includes(oldFault)){c=c.replace(oldFault,newFault);x=true;console.log('Fix8:faults');}
          if(!c.includes('S.connected&&!S.demo&&S.speed')){c=c.replace(\"document.getElementById('gear-d').textContent=S.gear;\",\"if(S.connected&&!S.demo&&S.speed>=0){S.gear=S.speed<3?'P':S.speed<15?'1':S.speed<35?'2':S.speed<65?'3':S.speed<100?'4':S.speed<130?'5':'6';}\ndocument.getElementById('gear-d').textContent=S.gear;\");x=true;console.log('Fix9:gear');}
          if(!c.includes('wakeLock')){c=c.replace('setInterval(tickClock,1000);tickClock();','setInterval(tickClock,1000);tickClock();\n  let _wakeLock=null;\n  async function acquireWakeLock(){try{if(\"wakeLock\" in navigator){_wakeLock=await navigator.wakeLock.request(\"screen\");_wakeLock.addEventListener(\"release\",()=>{_wakeLock=null;});}}catch(e){}}\n  acquireWakeLock();\n  document.addEventListener(\"visibilitychange\",async()=>{if(document.visibilityState===\"visible\"){acquireWakeLock();if(S.connected&&(btChar||_btClassic)&&!obdPoll)startPoll();}else{if(_wakeLock){try{await _wakeLock.release();}catch{}_wakeLock=null;}}});');x=true;console.log('Fix10:wakelock');}
          if(x)fs.writeFileSync(p,c,'utf-8');else console.log('No fixes needed');
          "

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Generate app icons
        run: echo "" | base64 -d > /tmp/mkicons.py && pip install Pillow --break-system-packages -q && python3 /tmp/mkicons.py

      - name: Patch MainActivity for background keep-alive
        run: echo "" | base64 -d > /tmp/patch_main.py && python3 /tmp/patch_main.py

      - name: Add Bluetooth + screen permissions
        run: |
          FILE="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "BLUETOOTH_CONNECT" "$FILE"; then
            sed -i 's|    <application|    <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <application|' "$FILE"
          fi
          if ! grep -q "keepScreenOn" "$FILE"; then
            sed -i 's|android:exported="true">|android:exported="true"\n            android:keepScreenOn="true">|' "$FILE"
          fi
          echo "Manifest updated"

      - name: Update app name
        run: |
          FILE="android/app/src/main/res/values/strings.xml"
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Craft Car Dashboard</string>|' "$FILE"
          echo "App name: $(grep app_name $FILE)"

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OBD-Dashboard-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

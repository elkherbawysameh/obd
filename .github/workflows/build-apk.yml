name: Build OBD Dashboard APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Patch plugin - insecure Bluetooth connect
        run: |
          FILE="node_modules/@e-is/capacitor-bluetooth-serial/android/src/main/java/com/bluetoothserial/BluetoothSerialService.java"
          sed -i 's/connect(device, true, serial)/connect(device, false, serial)/g' "$FILE"
          echo "Patched: $(grep 'connect(device,' $FILE)"

      - name: Prepare web assets
        run: |
          mkdir -p www
          if [ -f "index.html" ] && [ ! -f "www/index.html" ]; then
            cp index.html www/index.html
          fi
          ls www/ && echo "Assets ready"

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Generate app icons
        run: |
          pip install Pillow --break-system-packages -q
          python3 - << 'PYEOF'
          import os, math
          from PIL import Image, ImageDraw

          def draw_gear(draw, cx, cy, radius, teeth, tooth_h, hole_r, color):
              pts = []
              n = teeth * 4
              for i in range(n):
                  a = 2 * math.pi * i / n - math.pi / n
                  r = radius + tooth_h if (i % 4 in [1, 2]) else radius
                  pts.append((cx + r * math.cos(a), cy + r * math.sin(a)))
              draw.polygon(pts, fill=color)
              draw.ellipse([cx-hole_r, cy-hole_r, cx+hole_r, cy+hole_r], fill=(0,0,0,255))

          sizes = {"mdpi": 48, "hdpi": 72, "xhdpi": 96, "xxhdpi": 144, "xxxhdpi": 192}
          for dpi, sz in sizes.items():
              for fname in ["ic_launcher.png", "ic_launcher_round.png"]:
                  img = Image.new("RGBA", (sz, sz), (0, 0, 0, 255))
                  d = ImageDraw.Draw(img)
                  s = sz / 192
                  draw_gear(d, int(75*s), int(115*s), int(58*s), 10, int(11*s), int(32*s), "#1565C0")
                  draw_gear(d, int(128*s), int(72*s), int(46*s), 8, int(9*s), int(25*s), "#4CAF50")
                  out = "android/app/src/main/res/mipmap-" + dpi
                  os.makedirs(out, exist_ok=True)
                  img.save(out + "/" + fname)
          print("Icons done")
          PYEOF

      - name: Patch MainActivity for background keep-alive
        run: |
          python3 - << 'PYEOF'
          path = "android/app/src/main/java/com/obddashboard/app/MainActivity.java"
          with open(path) as f:
              c = f.read()
          if "onPause" not in c:
              patched = c.replace(
                  "public class MainActivity extends BridgeActivity {}",
                  "public class MainActivity extends BridgeActivity {\n    @Override\n    public void onPause() {\n        super.onPause();\n        if (getBridge() != null && getBridge().getWebView() != null) {\n            getBridge().getWebView().onResume();\n        }\n    }\n}"
              )
              with open(path, "w") as f:
                  f.write(patched)
              print("MainActivity patched")
          else:
              print("Already patched")
          PYEOF

      - name: Add Bluetooth + screen permissions
        run: |
          FILE="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "BLUETOOTH_CONNECT" "$FILE"; then
            sed -i 's|    <application|    <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <application|' "$FILE"
            echo "Bluetooth permissions added"
          fi
          if ! grep -q "keepScreenOn" "$FILE"; then
            sed -i 's|android:exported="true">|android:exported="true"\n            android:keepScreenOn="true">|' "$FILE"
            echo "keepScreenOn added"
          fi

      - name: Update app name
        run: |
          FILE="android/app/src/main/res/values/strings.xml"
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Craft Car Dashboard</string>|' "$FILE"
          echo "App name: $(grep app_name $FILE)"

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OBD-Dashboard-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

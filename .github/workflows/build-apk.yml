name: Build OBD Dashboard APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p www
          if [ -f "index.html" ] && [ ! -f "www/index.html" ]; then
            cp index.html www/index.html
          fi
          ls www/ && echo "Assets ready"

      - name: Fix truncated HTML
        run: |
          node -e "
          const fs = require('fs');
          const p = 'www/index.html';
          const tail = Buffer.from('', 'base64').toString('utf-8');
          const c = fs.readFileSync(p, 'utf-8');
          if (!c.includes('function finishScan')) {
            const lines = c.split('\n');
            const fixed = lines.slice(0, -1).join('\n') + '\n' + tail;
            fs.writeFileSync(p, fixed, 'utf-8');
            console.log('HTML fixed: appended missing functions');
          } else {
            console.log('HTML already complete');
          }
          "

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Add Bluetooth permissions
        run: |
          FILE="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "BLUETOOTH_CONNECT" "$FILE"; then
            sed -i 's|    <application|    <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <application|' "$FILE"
            echo "Bluetooth permissions added"
          fi

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OBD-Dashboard-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

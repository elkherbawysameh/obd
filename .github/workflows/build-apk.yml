name: Build Craft Car Dashboard APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Patch plugin - insecure Bluetooth connect
        run: |
          FILE="node_modules/@e-is/capacitor-bluetooth-serial/android/src/main/java/com/bluetoothserial/BluetoothSerialService.java"
          sed -i 's/connect(device, true, serial)/connect(device, false, serial)/g' "$FILE"
          echo "Patched: $(grep 'connect(device,' $FILE)"

      - name: Prepare web assets
        run: |
          mkdir -p www
          if [ -f "index.html" ] && [ ! -f "www/index.html" ]; then
            cp index.html www/index.html
          fi
          ls www/ && echo "Assets ready"

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Generate app icons
        run: |
          pip install Pillow --break-system-packages -q
          python3 - << 'PYEOF'
          import os, math
          from PIL import Image, ImageDraw

          def draw_rect_gear(draw, cx, cy, r_out, r_in, teeth, hole_r, color, start_a=0):
              pts = []
              hw = math.pi / teeth * 0.48
              for i in range(teeth):
                  a = start_a + 2 * math.pi * i / teeth
                  pts.append((cx + r_in  * math.cos(a - hw - 0.02), cy + r_in  * math.sin(a - hw - 0.02)))
                  pts.append((cx + r_out * math.cos(a - hw),         cy + r_out * math.sin(a - hw)))
                  pts.append((cx + r_out * math.cos(a + hw),         cy + r_out * math.sin(a + hw)))
                  pts.append((cx + r_in  * math.cos(a + hw + 0.02), cy + r_in  * math.sin(a + hw + 0.02)))
              draw.polygon(pts, fill=color)
              draw.ellipse([cx-hole_r, cy-hole_r, cx+hole_r, cy+hole_r], fill=(0,0,0,255))

          sizes = {"mdpi": 48, "hdpi": 72, "xhdpi": 96, "xxhdpi": 144, "xxxhdpi": 192}

          use_logo = os.path.exists("logo.png")
          if use_logo:
              src = Image.open("logo.png").convert("RGBA")
              print("Using logo.png from repo")

          for dpi, sz in sizes.items():
              for fname in ["ic_launcher.png", "ic_launcher_round.png"]:
                  if use_logo:
                      img = src.resize((sz, sz), Image.LANCZOS)
                  else:
                      img = Image.new("RGBA", (sz, sz), (0, 0, 0, 255))
                      d = ImageDraw.Draw(img)
                      s = sz / 192
                      draw_rect_gear(d, int(92*s), int(122*s), int(94*s), int(75*s), 8, int(44*s), "#1565C0", math.pi/8)
                      draw_rect_gear(d, int(130*s), int(68*s), int(64*s), int(50*s), 6, int(31*s), "#4CAF50", math.pi/6)
                  out = "android/app/src/main/res/mipmap-" + dpi
                  os.makedirs(out, exist_ok=True)
                  img.save(out + "/" + fname)
          print("Icons done" + (" (from logo.png)" if use_logo else " (generated)"))
          PYEOF

      - name: Patch MainActivity - keep-alive + Picture-in-Picture
        run: echo '' | base64 -d | python3

      - name: Add Bluetooth + screen + PiP permissions
        run: |
          FILE="android/app/src/main/AndroidManifest.xml"
          python3 - "$FILE" << 'PYEOF'
          import sys, re
          path = sys.argv[1]
          c = open(path).read()
          changed = False

          perms = [
              'android.permission.BLUETOOTH',
              'android.permission.BLUETOOTH_ADMIN',
              'android.permission.BLUETOOTH_CONNECT',
              'android.permission.BLUETOOTH_SCAN',
              'android.permission.ACCESS_FINE_LOCATION',
              'android.permission.ACCESS_COARSE_LOCATION',
              'android.permission.WAKE_LOCK',
          ]
          if 'BLUETOOTH_CONNECT' not in c:
              lines = []
              for p in perms:
                  extra = ' android:maxSdkVersion="30"' if p in ('android.permission.BLUETOOTH','android.permission.BLUETOOTH_ADMIN') else ''
                  lines.append('    <uses-permission android:name="' + p + '"' + extra + ' />')
              block = '\n'.join(lines) + '\n    <application'
              c = c.replace('    <application', block, 1)
              changed = True
              print("Bluetooth permissions added")

          if 'keepScreenOn' not in c:
              c = c.replace('android:exported="true">', 'android:exported="true"\n            android:keepScreenOn="true">', 1)
              changed = True
              print("keepScreenOn added")

          if 'supportsPictureInPicture' not in c:
              c = c.replace('android:keepScreenOn="true">', 'android:keepScreenOn="true"\n            android:supportsPictureInPicture="true">', 1)
              changed = True
              print("PiP added to AndroidManifest")
          else:
              print("PiP already present")

          if 'screenOrientation' not in c:
              c = c.replace('android:supportsPictureInPicture="true">', 'android:supportsPictureInPicture="true"\n            android:screenOrientation="landscape">', 1)
              changed = True
              print("Landscape orientation locked in AndroidManifest")
          else:
              print("screenOrientation already set")

          if changed:
              open(path, 'w').write(c)
          PYEOF

      - name: Update app name
        run: |
          FILE="android/app/src/main/res/values/strings.xml"
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Craft Car Dashboard</string>|' "$FILE"
          echo "App name: $(grep app_name $FILE)"

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OBD-Dashboard-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
